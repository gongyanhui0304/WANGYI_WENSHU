# Example only. Real permissions live on the MCP Server, not in the Skill.
# Replace all ids/tokens/mailboxes with values generated by your administrator.

users:
  - user_id: codex_user_a
    display_name: User A
    token: replace_with_user_a_token
    allowed_mailboxes:
      - mailbox_a
    permissions:
      - read_index
      - read_evidence
      - request_rebuild

  - user_id: codex_user_b
    display_name: User B
    token: replace_with_user_b_token
    allowed_mailboxes:
      - mailbox_b
    permissions:
      - read_index
      - read_evidence

mailboxes:
  mailbox_a:
    raw_path: ${MAIL_RAW_ROOT}/mailbox_a
    index_path: ${MAIL_INDEX_ROOT}/mailbox_a
    log_path: ${MAIL_LOG_ROOT}/mailbox_a

  mailbox_b:
    raw_path: ${MAIL_RAW_ROOT}/mailbox_b
    index_path: ${MAIL_INDEX_ROOT}/mailbox_b
    log_path: ${MAIL_LOG_ROOT}/mailbox_b

rules:
  deny_path_access: true
  require_mailbox_authorization: true
  evidence_access_by_id_only: true
  raw_mail_readonly: true
